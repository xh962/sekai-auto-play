name: Generate templates from videos

on:
  workflow_dispatch:

jobs:
  process_videos:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Process videos and generate templates
      run: |
        set -e
        mkdir -p templates/auto_templates
        for f in assets/*.mp4; do
          echo "Processing $f"
          base=$(basename "$f" .mp4)
          mkdir -p frames/$base
          # extract frames at 2 fps
          ffmpeg -y -i "$f" -vf fps=2 frames/$base/frame_%04d.png || true
          for img in frames/$base/*.png; do
            echo "Running auto template generator on $img"
            python tools/auto_template_generator.py --image "$img" --out-dir templates/auto_templates --debug || true
          done
        done

    - name: Commit generated templates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add templates/auto_templates || true
        git commit -m "Auto-generate templates from assets videos" || echo "No changes to commit"
        git push
